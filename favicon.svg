<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="petalGrad" x1="20%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#fbf9f2"/>
      <stop offset="55%" stop-color="#e7e3d6"/>
      <stop offset="100%" stop-color="#b7af98"/>
    </linearGradient>
    <radialGradient id="circleGrad" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#e9614f"/>
      <stop offset="55%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#7e2117"/>
    </radialGradient>
    <radialGradient id="shine" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="dropShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="innerSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>

  <!-- whole badge lifted off the canvas -->
  <g filter="url(#dropShadow)">
    <!-- petal / medallion frame -->
    <path d="M50 6 C58 18 70 22 82 18 C78 30 82 42 94 50 C82 58 78 70 82 82 C70 78 58 82 50 94 C42 82 30 78 18 82 C22 70 18 58 6 50 C18 42 22 30 18 18 C30 22 42 18 50 6 Z"
          fill="url(#petalGrad)" stroke="#9d9580" stroke-width="0.6"/>

    <!-- beveled edge highlight along inner rim of petals -->
    <path d="M50 6 C58 18 70 22 82 18 C78 30 82 42 94 50 C82 58 78 70 82 82 C70 78 58 82 50 94 C42 82 30 78 18 82 C22 70 18 58 6 50 C18 42 22 30 18 18 C30 22 42 18 50 6 Z"
          fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1" filter="url(#innerSoft)"/>

    <!-- red sphere center -->
    <circle cx="50" cy="50" r="28" fill="url(#circleGrad)"/>
    <circle cx="50" cy="50" r="28" fill="none" stroke="#5e160d" stroke-width="1.4" stroke-opacity="0.6"/>

    <!-- glossy highlight on the sphere -->
    <ellipse cx="40" cy="34" rx="16" ry="11" fill="url(#shine)"/>

    <!-- script R -->
    <text x="50" y="53" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="600"
          font-size="34" fill="#f7f2e3" text-anchor="middle" dominant-baseline="middle"
          stroke="#5e160d" stroke-width="0.4" stroke-opacity="0.25">R</text>
  </g>
</svg>